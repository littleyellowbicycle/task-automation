version: "3.8"

services:
  sglang:
    build:
      context: .
      dockerfile: Dockerfile
    image: sglang-qwen3:0.6b
    container_name: sglang-qwen3
    ports:
      - "8000:8000"
    environment:
      - MODEL_NAME=Qwen/Qwen3-0.6B
      - HOST=0.0.0.0
      - PORT=8000
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    volumes:
      - model_cache:/root/.cache/huggingface
    restart: unless-stopped

volumes:
  model_cache:
